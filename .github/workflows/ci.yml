name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"

env:
  # Force every test run to use an offline, in-memory SQLite DB.
  # Tests must NEVER touch Neon or any production resource.
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  ENV: "test"
  DEBUG: "false"
  APP_NAME: "LeadsForge-CI"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Ruff lint (backend)
        working-directory: backend
        run: ruff check .

      - name: Ruff format check (backend)
        working-directory: backend
        run: ruff format --check .

      - name: Pytest with coverage
        # Run from repo root so the workspace pytest.ini is used and the
        # `tests/` directory at the root is discovered. pytest.ini sets
        # `pythonpath = backend` so `from app.* import ...` works.
        # No Alembic migrations are run; tables are created via
        # Base.metadata.create_all in the conftest fixtures.
        run: |
          pytest \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
