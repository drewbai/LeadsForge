[tool.poetry]
name = "leadsforge-backend"
version = "0.0.1"
description = "LeadsForge backend skeleton"
authors = []

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "*"
uvicorn = { extras = ["standard"], version = "*" }
pydantic = "*"
python-dotenv = "*"
httpx = "*"

[tool.poetry.group.dev.dependencies]
pytest = "*"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["ANN", "C90"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"